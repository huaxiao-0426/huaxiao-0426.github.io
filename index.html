<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的私人小手机 AI</title>
    
    <style>
        :root { 
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --main-color: #ffb6c1; /* 主色调：粉色 */
            --ai-bubble: #ffffff; 
            --user-bubble: #ffb6c1;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        
        /* 背景图层 */
        #bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            z-index: -1; background-color: #fdf2f4; transition: 0.5s;
        }

        /* 主容器 */
        .app-container { 
            display: flex; flex-direction: column; height: 100vh; 
            backdrop-filter: blur(8px); /* 磨砂玻璃效果 */
        }

        /* 顶部栏 */
        .nav-bar { 
            padding: env(safe-area-inset-top) 15px 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--glass-bg); border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-bar h3 { margin: 0; font-size: 16px; color: #d81b60; }

        /* 聊天区域 */
        #chat-flow { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px; 
        }

        /* 气泡样式 */
        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 15px; 
            font-size: 14px; line-height: 1.5; word-wrap: break-word; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        .ai-bubble { align-self: flex-start; background: var(--ai-bubble); color: #333; border-top-left-radius: 2px; }
        .user-bubble { align-self: flex-end; background: var(--user-bubble); color: white; border-top-right-radius: 2px; }

        /* 输入框区域 */
        .input-box { 
            padding: 10px 15px calc(10px + env(safe-area-inset-bottom)) 15px; 
            background: var(--glass-bg); display: flex; gap: 10px; 
        }
        #userInput { 
            flex: 1; border: 1px solid #eee; padding: 10px 18px; 
            border-radius: 25px; outline: none; font-size: 16px; 
        }
        .send-btn { background: var(--main-color); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; }

        /* 设置面板样式 */
        #settings-panel { 
            position: fixed; inset: 0; background: white; z-index: 999; 
            display: none; flex-direction: column; padding: 25px; box-sizing: border-box; 
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #999; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #f0f0f0; border-radius: 10px; box-sizing: border-box; background: #fafafa; }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div class="app-container">
    <div class="nav-bar">
        <div style="width: 24px"></div>
        <h3>✨ 我的私人小手机</h3>
        <span onclick="openSettings()" style="font-size: 20px; cursor: pointer;">⚙️</span>
    </div>

    <div id="chat-flow">
        <div class="bubble ai-bubble">你好呀！欢迎来到你的专属 AI 空间。<br><br><b>第一步：</b>点击右上角⚙️，填入你的 API 配置。<br><b>第二步：</b>开始愉快地聊天吧！</div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="给 AI 发送消息...">
        <button class="send-btn" onclick="handleSend()">发送</button>
    </div>
</div>

<div id="settings-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="margin:0; font-size: 20px;">系统设置</h2>
        <span onclick="closeSettings()" style="font-size: 28px; cursor: pointer;">×</span>
    </div>

    <div class="input-group">
        <label>接口地址 (API Endpoint)</label>
        <input type="text" id="set-url" placeholder="如: https://api.deepseek.com">
    </div>
    <div class="input-group">
        <label>API 密钥 (API Key)</label>
        <input type="password" id="set-key" placeholder="在此粘贴你的 Key">
    </div>
    <div class="input-group">
        <label>模型名称 (Model)</label>
        <input type="text" id="set-model" placeholder="如: gemini-1.5-flash">
    </div>
    <div class="input-group">
        <label>自定义背景图片网址</label>
        <input type="text" id="set-bg" placeholder="粘贴图片 URL 链接">
    </div>

    <button onclick="saveAndApply()" style="width: 100%; background: #ffb6c1; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 20px;">保存并立即生效</button>
    <div style="margin-top: auto; text-align: center; color: #ccc; font-size: 12px;">配置仅保存在本地，不经过服务器</div>
</div>

<script>
    // 1. 初始化：从手机本地加载配置
    let myConfig = JSON.parse(localStorage.getItem('phone_ai_config')) || {
        url: '', key: '', model: 'gemini-1.5-flash', bg: ''
    };

    function applyAppConfig() {
        if(myConfig.bg) document.getElementById('bg-layer').style.backgroundImage = `url('${myConfig.bg}')`;
    }
    applyAppConfig();

    // 2. 界面控制
    function openSettings() {
        document.getElementById('settings-panel').style.display = 'flex';
        document.getElementById('set-url').value = myConfig.url;
        document.getElementById('set-key').value = myConfig.key;
        document.getElementById('set-model').value = myConfig.model;
        document.getElementById('set-bg').value = myConfig.bg;
    }

    function closeSettings() {
        document.getElementById('settings-panel').style.display = 'none';
    }

    function saveAndApply() {
        myConfig = {
            url: document.getElementById('set-url').value.trim().replace(/\/+$/, ""),
            key: document.getElementById('set-key').value.trim(),
            model: document.getElementById('set-model').value.trim(),
            bg: document.getElementById('set-bg').value.trim()
        };
        localStorage.setItem('phone_ai_config', JSON.stringify(myConfig));
        applyAppConfig();
        closeSettings();
        alert('配置成功！');
    }

    // 3. 核心聊天功能
    async function handleSend() {
        const input = document.getElementById('userInput');
        const flow = document.getElementById('chat-flow');
        const text = input.value.trim();

        if (!text) return;
        if (!myConfig.key) { alert('请先点设置填入 API Key！'); return; }

        // 用户气泡
        flow.innerHTML += `<div class="bubble user-bubble">${text}</div>`;
        input.value = '';
        flow.scrollTop = flow.scrollHeight;

        // AI 等待气泡
        const aiBubble = document.createElement('div');
        aiBubble.className = 'bubble ai-bubble';
        aiBubble.innerText = '正在联络大脑...';
        flow.appendChild(aiBubble);

        try {
            let res, data, reply;
            // 判断是否为 Gemini 系列格式
            if (myConfig.url.includes('googleapis') || myConfig.model.includes('gemini')) {
                res = await fetch(`${myConfig.url}/v1beta/models/${myConfig.model}:generateContent?key=${myConfig.key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                data = await res.json();
                reply = data.candidates[0].content.parts[0].text;
            } else {
                // 通用 OpenAI 协议 (DeepSeek, Kimi, 反代等)
                res = await fetch(`${myConfig.url}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${myConfig.key}` },
                    body: JSON.stringify({ model: myConfig.model, messages: [{role: "user", content: text}] })
                });
                data = await res.json();
                reply = data.choices[0].message.content;
            }
            aiBubble.innerText = reply;
        } catch (e) {
            aiBubble.style.color = 'red';
            aiBubble.innerText = '连接失败：请检查 API 地址、Key 或模型名是否正确。如果是谷歌直连，请检查网络。';
        }
        flow.scrollTop = flow.scrollHeight;
    }

    // 支持回车发送
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') handleSend();
    });
</script>

</body>
</html>
